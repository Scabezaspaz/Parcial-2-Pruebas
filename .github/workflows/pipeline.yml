name: CI Pipeline RecargaYa

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instalar dependencias
        run: |
          pip install pytest pytest-bdd fastapi uvicorn locust

      - name: Tests unitarios
        run: |
          pytest tests/test_recarga.py -v

      - name: Tests BDD
        run: |
          pytest tests/features/steps/steps_recarga.py -v

      - name: Levantar API y tests de rendimiento
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          locust -f locustfile.py --headless -u 30 -r 5 --run-time 30s --host http://localhost:8000